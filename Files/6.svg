<svg xmlns="http://www.w3.org/2000/svg" width="450" height="320" viewBox="0 0 450 320">
  <defs>
    <radialGradient id="bgPurple" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2a0a3a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#08050d" stop-opacity="1"/>
    </radialGradient>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="borderPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#9333ea" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  
  <rect x="10" y="10" width="430" height="300" rx="20" fill="none" stroke="#c084fc" stroke-width="2" filter="url(#glowPurple)">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.5s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="10" y="10" width="430" height="300" rx="20" fill="url(#bgPurple)" stroke="url(#borderPurple)" stroke-width="1.5"/>
  
  <rect x="10" y="10" width="430" height="300" rx="20" fill="none" stroke="#d8a8ff" stroke-width="1" stroke-dasharray="40 1420" opacity="0.8" filter="url(#strongGlowPurple)">
    <animate attributeName="stroke-dashoffset" values="0;-1460" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="20" y="20" width="100" height="3" rx="1.5" fill="#c084fc" filter="url(#glowPurple)">
    <animate attributeName="width" values="100;120;100" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <text x="30" y="50" font-family="Monaco, 'Courier New', monospace" font-size="11" font-weight="700" fill="#c084fc" letter-spacing="2">TESTING · TOOLS · WORKFLOW</text>
  
  <text x="30" y="100" font-size="36">🛠️</text>
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff" filter="url(#strongGlowPurple)">
    Tools &amp; Quality
    <animate attributeName="fill" values="#ffffff;#e8d4ff;#ffffff" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <text x="30" y="130" font-family="Arial, sans-serif" font-size="13" fill="#cccccc" font-style="italic">Testing, debugging, modern workflows.</text>
  
  <line x1="30" y1="150" x2="420" y2="150" stroke="#c084fc" stroke-width="0.5">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <text x="30" y="180" font-family="Monaco, 'Courier New', monospace" font-size="14" fill="#e8d4ff">VS Code · Git</text>
  <text x="30" y="205" font-family="Monaco, 'Courier New', monospace" font-size="14" fill="#e8d4ff">Testing · Debugging</text>
  <text x="30" y="230" font-family="Monaco, 'Courier New', monospace" font-size="14" fill="#e8d4ff">Kali Linux</text>
  
  <line x1="30" y1="255" x2="420" y2="255" stroke="#c084fc" stroke-width="0.5">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <text x="30" y="285" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#c084fc" filter="url(#strongGlowPurple)">
    3+
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="30" y="300" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#cccccc" letter-spacing="1">YEARS</text>
  
  <text x="140" y="285" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#c084fc" filter="url(#strongGlowPurple)">
    25+
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </text>
  <text x="140" y="300" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#cccccc" letter-spacing="1">PROJECTS</text>
  
  <text x="320" y="285" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#c084fc" filter="url(#strongGlowPurple)">
    EXPERT
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </text>
  <text x="320" y="300" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#cccccc" letter-spacing="1">MASTERY</text>
  
  <rect x="20" y="304" width="60" height="2" rx="1" fill="#c084fc" filter="url(#glowPurple)">
    <animate attributeName="width" values="60;80;60" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
