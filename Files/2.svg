<svg xmlns="http://www.w3.org/2000/svg" width="450" height="320" viewBox="0 0 450 320">
  <defs>
    <radialGradient id="bgRed" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3a0a0a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d0505" stop-opacity="1"/>
    </radialGradient>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="borderRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ff0000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="shimmerRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffaaaa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
      <animate attributeName="x1" values="-100%;100%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  
  <!-- Outer pulsing glow -->
  <rect x="10" y="10" width="430" height="300" rx="20" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glowRed)">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Card background -->
  <rect x="10" y="10" width="430" height="300" rx="20" fill="url(#bgRed)" stroke="url(#borderRed)" stroke-width="1.5"/>
  
  <!-- Running light border -->
  <rect x="10" y="10" width="430" height="300" rx="20" fill="none" stroke="#ff6666" stroke-width="1" stroke-dasharray="40 1420" opacity="0.8" filter="url(#strongGlowRed)">
    <animate attributeName="stroke-dashoffset" values="0;-1460" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Top neon accent line -->
  <rect x="20" y="20" width="100" height="3" rx="1.5" fill="#ff4444" filter="url(#glowRed)">
    <animate attributeName="width" values="100;120;100" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Category label -->
  <text x="30" y="50" font-family="Monaco, 'Courier New', monospace" font-size="11" font-weight="700" fill="#ff4444" letter-spacing="2">SERVER · APIS · LOGIC</text>
  
  <!-- Shimmer overlay on category -->
  <rect x="30" y="40" width="170" height="14" fill="url(#shimmerRed)" opacity="0.6"/>
  
  <!-- Icon + Title -->
  <text x="30" y="100" font-size="36">
    <animateTransform attributeName="transform" type="rotate" from="0 48 90" to="360 48 90" dur="20s" repeatCount="indefinite"/>
    ⚙️
  </text>
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff" filter="url(#strongGlowRed)">
    Backend
    <animate attributeName="fill" values="#ffffff;#ffe0e0;#ffffff" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <!-- Tagline -->
  <text x="30" y="130" font-family="Arial, sans-serif" font-size="13" fill="#cccccc" font-style="italic">Robust, well-tested server-side systems.</text>
  
  <!-- Divider with pulse -->
  <line x1="30" y1="150" x2="420" y2="150" stroke="#ff4444" stroke-width="0.5">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Tools -->
  <text x="30" y="180" font-family="Monaco, 'Courier New', monospace" font-size="14" fill="#ffd0d0">Python · Django</text>
  <text x="30" y="205" font-family="Monaco, 'Courier New', monospace" font-size="14" fill="#ffd0d0">DRF · FastAPI</text>
  <text x="30" y="230" font-family="Monaco, 'Courier New', monospace" font-size="14" fill="#ffd0d0">REST APIs</text>
  
  <!-- Divider with pulse -->
  <line x1="30" y1="255" x2="420" y2="255" stroke="#ff4444" stroke-width="0.5">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Stats with glow pulse -->
  <text x="30" y="285" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#ff4444" filter="url(#strongGlowRed)">
    3+
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="30" y="300" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#cccccc" letter-spacing="1">YEARS</text>
  
  <text x="140" y="285" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#ff4444" filter="url(#strongGlowRed)">
    20+
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </text>
  <text x="140" y="300" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#cccccc" letter-spacing="1">PROJECTS</text>
  
  <text x="320" y="285" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#ff4444" filter="url(#strongGlowRed)">
    EXPERT
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </text>
  <text x="320" y="300" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#cccccc" letter-spacing="1">MASTERY</text>
  
  <!-- Bottom accent with pulse -->
  <rect x="20" y="304" width="60" height="2" rx="1" fill="#ff4444" filter="url(#glowRed)">
    <animate attributeName="width" values="60;80;60" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
