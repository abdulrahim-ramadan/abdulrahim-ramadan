name: 🎮 Mario Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"   # كل 12 ساعة
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  mario:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Mario contribution animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/mario-contribution.svg?palette=mario
            dist/mario-contribution-dark.svg?palette=mario&color_dots[]=0,1a1a2e&color_dots[]=1,0f3460&color_dots[]=2,16213e&color_dots[]=3,e94560&color_dots[]=4,ff6b6b&color_empty=1a1a2e&color_bg=1a1a2e

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
